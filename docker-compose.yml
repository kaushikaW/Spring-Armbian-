version: "3.9"

services:

  postgres:
    image: postgres:latest
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  user-service:
    build: .
    container_name: user-service
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    restart: always

volumes:
  postgres_data:
